<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Lab 6.1 - ระบบแปลงหน่วย (switch-case)</title>
<style>
  *{margin:0; padding:0; box-sizing:border-box;}
  body{
    font-family:'Sarabun',sans-serif; 
    background:linear-gradient(135deg, #e0f4ff 0%, #b3e5fc 50%, #80deea 100%);
    padding:20px;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .box{
    max-width:480px; 
    width:100%;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    padding:40px; 
    border-radius:16px; 
    box-shadow:0 20px 60px rgba(0,150,200,0.15), inset 0 1px 0 rgba(255,255,255,0.6);
    border:2px solid rgba(0,150,200,0.2);
    animation:slideDown 0.6s ease-out;
  }
  @keyframes slideDown{
    from{transform:translateY(-20px); opacity:0;}
    to{transform:translateY(0); opacity:1;}
  }
  h1{
    font-size:28px; 
    color:#0277bd;
    margin-bottom:32px;
    font-weight:700;
    text-align:center;
    letter-spacing:0.5px;
  }
  label{
    display:block; 
    margin-top:18px; 
    font-size:14px;
    color:#01579b;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:1px;
  }
  input, select{
    width:100%; 
    padding:14px 16px; 
    margin-top:8px; 
    border:2px solid #b3e5fc;
    border-radius:10px;
    background:rgba(227,242,253,0.6);
    color:#01579b;
    font-family:'Sarabun',sans-serif;
    font-size:14px;
    transition:all 0.3s ease;
  }
  input::placeholder{
    color:#4db6ac;
  }
  input:focus, select:focus{
    outline:none;
    border-color:#0097a7;
    box-shadow:0 0 15px rgba(0,150,167,0.3);
    background:rgba(227,242,253,0.9);
    transform:translateY(-2px);
  }
  input:hover, select:hover{
    border-color:#00838f;
  }
  button{
    margin-top:28px; 
    width:100%;
    padding:14px 24px; 
    background:linear-gradient(135deg, #00838f 0%, #0097a7 100%);
    color:#fff; 
    border:none; 
    border-radius:10px; 
    cursor:pointer;
    font-size:16px;
    font-weight:700;
    font-family:'Sarabun',sans-serif;
    transition:all 0.3s ease;
    box-shadow:0 8px 20px rgba(0,150,167,0.25);
  }
  button:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 30px rgba(0,150,167,0.35);
  }
  button:active{
    transform:translateY(-1px);
  }
  #result{
    margin-top:28px; 
    background:linear-gradient(135deg, rgba(0,150,167,0.08) 0%, rgba(0,188,212,0.08) 100%);
    border:2px solid #80deea;
    padding:20px; 
    border-radius:12px; 
    font-size:16px;
    color:#00546b;
    font-weight:600;
    line-height:1.6;
    box-shadow:inset 0 0 20px rgba(128,222,234,0.1);
  }
</style>
</head>
<body>
<div class="box">
  <h1>Lab 6.1: ระบบแปลงหน่วย</h1>
  <label>ประเภทการแปลง</label>
  <select id="convertType">
    <option value="kgToLb">กิโลกรัม → ปอนด์</option>
    <option value="cToF">เซลเซียส → ฟาเรนไฮต์</option>
    <option value="kmToMile">กิโลเมตร → ไมล์</option>
  </select>
  <label>ค่าที่ต้องการแปลง</label>
  <input type="number" id="inputValue" placeholder="กรอกตัวเลข">
  <button onclick="convert()">แปลงหน่วย</button>
  <div id="result"></div>
</div>

<script>
function convert() {
  let type = document.getElementById("convertType").value;
  let value = parseFloat(document.getElementById("inputValue").value);
  let result = 0;
  const resultBox = document.getElementById("result");

  if (isNaN(value)) {
    resultBox.innerText = "กรุณากรอกตัวเลข";
    return;
  }

  switch (type) {
    case "kgToLb":
      result = value * 2.20462;
      resultBox.innerText = `${value} กิโลกรัม = ${result.toFixed(2)} ปอนด์`;
      break;
    case "cToF":
      result = (value * 9 / 5) + 32;
      resultBox.innerText = `${value} องศาเซลเซียส = ${result.toFixed(2)} องศาฟาเรนไฮต์`;
      break;
    case "kmToMile":
      result = value * 0.621371;
      resultBox.innerText = `${value} กิโลเมตร = ${result.toFixed(2)} ไมล์`;
      break;
    default:
      resultBox.innerText = "กรุณาเลือกประเภทการแปลง";
  }
}
</script>
</body>
</html>
