<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Lab 6.2 - กรองสินค้าตามหมวดหมู่</title>
<style>
  *{margin:0; padding:0; box-sizing:border-box;}
  body{
    font-family:'Sarabun',sans-serif; 
    background:linear-gradient(135deg, #1a1a2e 0%, #0f3460 50%, #533483 100%);
    padding:20px;
    min-height:100vh;
  }
  .box{
    max-width:700px; 
    margin:auto; 
    background:#000;
    border:3px solid #ff006e;
    padding:32px; 
    border-radius:12px; 
    box-shadow:0 0 40px rgba(255,0,110,0.4), inset 0 0 30px rgba(255,0,110,0.1);
  }
  h1{
    font-size:32px; 
    color:#fff;
    margin-bottom:24px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:2px;
    text-shadow:0 0 20px rgba(255,0,110,0.6);
    border-bottom:3px solid #ff006e;
    padding-bottom:16px;
  }
  select{
    width:100%; 
    padding:14px 16px; 
    margin:16px 0; 
    border:2px solid #ff006e;
    border-radius:6px;
    background:#1a1a2e;
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:all 0.3s ease;
    font-family:'Sarabun',sans-serif;
  }
  select:hover{
    background:#0f3460;
    box-shadow:0 0 15px rgba(255,0,110,0.4);
  }
  select:focus{
    outline:none;
    box-shadow:0 0 20px rgba(255,0,110,0.6);
  }
  table{
    width:100%; 
    border-collapse:collapse; 
    font-size:14px;
    margin-top:20px;
  }
  thead tr{
    background:linear-gradient(135deg, #ff006e 0%, #ff3c87 100%);
  }
  th{
    color:#fff;
    padding:16px; 
    text-align:center;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:1px;
    font-size:13px;
    border:2px solid #ff006e;
  }
  td{
    border:2px solid #ff006e;
    padding:12px; 
    text-align:center;
    color:#fff;
    background:#1a1a2e;
    font-weight:600;
    transition:all 0.3s ease;
  }
  tbody tr:hover td{
    background:#0f3460;
    box-shadow:inset 0 0 10px rgba(255,0,110,0.2);
    transform:scale(1.02);
  }
  tbody tr:nth-child(odd) td{
    background:#0d2440;
  }
  tbody tr:nth-child(odd):hover td{
    background:#0f3460;
  }
</style>
</head>
<body>
<div class="box">
  <h1>Lab 6.2: กรองสินค้าตามหมวดหมู่</h1>
  <select id="categoryFilter" onchange="filterProducts()">
    <option value="ทั้งหมด">ทั้งหมด</option>
    <option value="เสื้อผ้า">เสื้อผ้า</option>
    <option value="อุปกรณ์">อุปกรณ์</option>
    <option value="อาหาร">อาหาร</option>
  </select>
  <table>
    <thead>
      <tr><th>สินค้า</th><th>หมวดหมู่</th><th>ราคา</th><th>สต็อก</th></tr>
    </thead>
    <tbody id="productTable"></tbody>
  </table>
</div>

<script>
const products = [
  { name: "เสื้อยืด",        category: "เสื้อผ้า", price: 250, stock: 30 },
  { name: "กางเกงยีนส์",     category: "เสื้อผ้า", price: 590, stock: 15 },
  { name: "หูฟังไร้สาย",     category: "อุปกรณ์", price: 890, stock: 8  },
  { name: "เมาส์ไร้สาย",     category: "อุปกรณ์", price: 320, stock: 20 },
  { name: "ขนมปังโฮลวีต",   category: "อาหาร",   price: 45,  stock: 50 },
  { name: "กาแฟคั่วบด",      category: "อาหาร",   price: 180, stock: 25 },
];

function filterProducts() {
  const selected = document.getElementById("categoryFilter").value;
  let filtered;

  if (selected === "ทั้งหมด") {
    filtered = products;
  } else if (selected === "เสื้อผ้า") {
    filtered = products.filter(p => p.category === "เสื้อผ้า");
  } else if (selected === "อุปกรณ์") {
    filtered = products.filter(p => p.category === "อุปกรณ์");
  } else if (selected === "อาหาร") {
    filtered = products.filter(p => p.category === "อาหาร");
  }

  document.getElementById("productTable").innerHTML = filtered.map(p =>
    `<tr><td>${p.name}</td><td>${p.category}</td><td>${p.price}</td><td>${p.stock}</td></tr>`
  ).join("");
}

filterProducts();
</script>
</body>
</html>
