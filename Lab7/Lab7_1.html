<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Lab 7.1 - จัดการข้อมูลนักเรียน</title>
<style>
  *{margin:0; padding:0; box-sizing:border-box;}
  body{
    font-family:'Sarabun',sans-serif; 
    background:linear-gradient(135deg, #1a472a 0%, #0d5f2e 50%, #0a3d1f 100%);
    padding:20px;
    min-height:100vh;
  }
  .box{
    max-width:620px; 
    margin:auto; 
    background:#fff;
    padding:32px; 
    border-radius:12px; 
    box-shadow:0 20px 60px rgba(0,0,0,0.3), 0 0 40px rgba(255,255,255,0.1);
    border:4px solid #000;
  }
  h1{
    font-size:28px; 
    color:#000;
    margin-bottom:28px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:1.5px;
    text-align:center;
    background:linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    text-shadow:2px 2px 4px rgba(0,0,0,0.1);
  }
  table{
    width:100%; 
    border-collapse:collapse; 
    font-size:14px; 
    margin-top:16px;
    border:3px solid #000;
  }
  thead tr{
    background:linear-gradient(135deg, #000 0%, #1a1a1a 100%);
  }
  th{
    color:#ffd700;
    padding:14px; 
    text-align:center;
    font-weight:900;
    border:2px solid #ffd700;
    text-transform:uppercase;
    letter-spacing:1px;
    font-size:12px;
  }
  td{
    border:2px solid #ddd;
    padding:12px; 
    text-align:center;
    color:#000;
    font-weight:600;
    background:#f9f9f9;
  }
  tbody tr:nth-child(odd) td{
    background:#e8f5e9;
  }
  tbody tr:hover td{
    background:#c8e6c9;
    transform:scale(1.02);
    transition:all 0.3s ease;
  }
  #summary{
    margin-top:20px; 
    background:linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
    border:3px solid #1a472a;
    padding:18px; 
    border-radius:8px; 
    font-size:15px;
    font-weight:600;
    color:#0d5f2e;
    line-height:1.8;
  }
  #summary p{
    margin:8px 0;
  }
</style>
</head>
<body>
<div class="box">
  <h1>Lab 7.1: ระบบจัดการข้อมูลนักเรียน</h1>
  <table>
    <thead><tr><th>ID</th><th>ชื่อ</th><th>คะแนนเฉลี่ย</th><th>เกรด</th></tr></thead>
    <tbody id="studentTable"></tbody>
  </table>
  <div id="summary"></div>
</div>

<script>
const students = [
  { id: 1, name: "นันเดล จานสี",  scores: [85, 90, 88], grade: "A" },
  { id: 2, name: "นันเนีย จานฟ่า", scores: [75, 88, 78], grade: "B" },
  { id: 3, name: "นันฟ้า จานเรย",  scores: [95, 92, 94], grade: "A" },
  { id: 4, name: "นันธา จานเลย",   scores: [65, 70, 68], grade: "C" },
];

function displayStudents() {
  let tableHtml = "";
  students.map(student => {
    const avgScore = student.scores.reduce((a,b)=>a+b,0) / student.scores.length;
    tableHtml += `<tr><td>${student.id}</td><td>${student.name}</td><td>${avgScore.toFixed(2)}</td><td>${student.grade}</td></tr>`;
  });
  document.getElementById("studentTable").innerHTML = tableHtml;

  // นักเรียนที่ได้เกรด A
  const gradeA = students.filter(s => s.grade === "A");

  // ค่าเฉลี่ยรวมทั้งชั้น
  const overallAvg = students.reduce((sum, s) => {
    const studentAvg = s.scores.reduce((a,b)=>a+b,0) / s.scores.length;
    return sum + studentAvg;
  }, 0) / students.length;

  document.getElementById("summary").innerHTML = `
    <p><b>นักเรียนที่ได้เกรด A:</b> ${gradeA.map(s => s.name).join(", ")}</p>
    <p><b>คะแนนเฉลี่ยรวมทั้งชั้น:</b> ${overallAvg.toFixed(2)}</p>
  `;
}

displayStudents();
</script>
</body>
</html>
