<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Lab 8.2 - ระบบขายสินค้า (for/while/do-while)</title>
<style>
  *{margin:0; padding:0; box-sizing:border-box;}
  body{
    font-family:'Sarabun','Segoe UI',sans-serif; 
    background:linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0f1729 100%);
    padding:20px;
    min-height:100vh;
  }
  .box{
    max-width:700px; 
    margin:auto; 
    background:#000;
    padding:40px; 
    border-radius:16px; 
    box-shadow:0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
  }
  h1{
    font-size:32px; 
    color:#fff;
    margin-bottom:32px;
    font-weight:800;
    letter-spacing:1px;
    text-align:center;
    text-transform:uppercase;
    text-shadow:0 0 20px rgba(255,255,255,0.3);
  }
  h2{
    font-size:16px; 
    margin-top:28px; 
    color:#ddd;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.8px;
    border-bottom:2px solid rgba(255,255,255,0.2);
    padding-bottom:12px;
  }
  table{
    width:100%; 
    border-collapse:collapse; 
    font-size:14px; 
    margin-top:12px;
    border:1px solid rgba(255,255,255,0.15);
    border-radius:8px;
    overflow:hidden;
  }
  thead tr{
    background:linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
    border-bottom:2px solid rgba(255,255,255,0.2);
  }
  th{
    color:#fff;
    padding:14px; 
    text-align:center;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.5px;
    font-size:12px;
  }
  td{
    border-bottom:1px solid rgba(255,255,255,0.08);
    padding:12px 14px; 
    text-align:center;
    color:#ddd;
    font-weight:500;
    background:rgba(255,255,255,0.02);
  }
  tbody tr:hover td{
    background:rgba(255,255,255,0.08);
    color:#fff;
    transition:all 0.3s ease;
  }
  tbody tr:nth-child(odd) td{
    background:rgba(255,255,255,0.04);
  }
  tbody tr:nth-child(odd):hover td{
    background:rgba(255,255,255,0.08);
  }
  #summary{
    margin-top:28px;
    background:linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.04) 100%);
    border:1px solid rgba(255,255,255,0.15);
    border-left:4px solid rgba(255,255,255,0.4);
    padding:20px 24px;
    border-radius:10px;
    font-size:14px;
    color:#ddd;
    font-weight:600;
    line-height:1.9;
  }
  #summary p{
    margin:10px 0;
  }
  #summary p strong{
    color:#fff;
    font-weight:800;
  }\n</style>
</head>
<body>
<div class="box">
  <h1>Lab 8.2: ระบบขายสินค้า</h1>

  <h2>ตารางสินค้า (สร้างด้วย for loop)</h2>
  <table id="tableFor"></table>

  <h2>ตารางสินค้า (สร้างด้วย while loop)</h2>
  <table id="tableWhile"></table>

  <h2>ตารางสินค้า (สร้างด้วย do-while loop)</h2>
  <table id="tableDoWhile"></table>

  <div id="summary"></div>
</div>

<script>
const products = [
  { name: "Keyboard",   price: 1200, qty: 2 },
  { name: "Mouse",      price: 500,  qty: 3 },
  { name: "Monitor",    price: 4500, qty: 1 },
  { name: "Speaker",    price: 1500, qty: 1 },
  { name: "Headphones", price: 800,  qty: 2 },
];

function headerRow() {
  return "<tr><th>สินค้า</th><th>ราคา</th><th>จำนวน</th><th>รวม</th></tr>";
}

// 1) สร้างตารางด้วย for loop
function buildWithFor() {
  let html = headerRow();
  for (let i = 0; i < products.length; i++) {
    const p = products[i];
    html += `<tr><td>${p.name}</td><td>${p.price}</td><td>${p.qty}</td><td>${p.price * p.qty}</td></tr>`;
  }
  document.getElementById("tableFor").innerHTML = html;
}

// 2) สร้างตารางด้วย while loop
function buildWithWhile() {
  let html = headerRow();
  let i = 0;
  while (i < products.length) {
    const p = products[i];
    html += `<tr><td>${p.name}</td><td>${p.price}</td><td>${p.qty}</td><td>${p.price * p.qty}</td></tr>`;
    i++;
  }
  document.getElementById("tableWhile").innerHTML = html;
}

// 3) สร้างตารางด้วย do-while loop
function buildWithDoWhile() {
  let html = headerRow();
  let i = 0;
  do {
    const p = products[i];
    html += `<tr><td>${p.name}</td><td>${p.price}</td><td>${p.qty}</td><td>${p.price * p.qty}</td></tr>`;
    i++;
  } while (i < products.length);
  document.getElementById("tableDoWhile").innerHTML = html;
}

// คำนวณราคารวม ส่วนลด และ VAT
function calculateSummary() {
  let subtotal = 0;
  for (let i = 0; i < products.length; i++) {
    subtotal += products[i].price * products[i].qty;
  }

  let discountRate = 0;
  if (subtotal >= 10000) {
    discountRate = 0.10;
  } else if (subtotal >= 5000) {
    discountRate = 0.05;
  }

  const discount = subtotal * discountRate;
  const afterDiscount = subtotal - discount;
  const vat = afterDiscount * 0.07;
  const total = afterDiscount + vat;

  document.getElementById("summary").innerHTML = `
    <p>ยอดรวมก่อนส่วนลด: ${subtotal.toLocaleString()} บาท</p>
    <p>ส่วนลด (${(discountRate*100)}%): ${discount.toFixed(2)} บาท</p>
    <p>ยอดหลังหักส่วนลด: ${afterDiscount.toFixed(2)} บาท</p>
    <p>ภาษีมูลค่าเพิ่ม 7%: ${vat.toFixed(2)} บาท</p>
    <p><strong>ยอดสุทธิที่ต้องชำระ: ${total.toFixed(2)} บาท</strong></p>
  `;
}

buildWithFor();
buildWithWhile();
buildWithDoWhile();
calculateSummary();
</script>
</body>
</html>
