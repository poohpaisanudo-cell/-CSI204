<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lab 3.1 - คำนวณสินเชื่อบ้าน</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Sarabun:wght@400;500;600;700&display=swap');

  :root{
    --navy: #14213D;
    --navy-deep: #0C1730;
    --ivory: #FBF8F2;
    --gold: #C9A227;
    --gold-light: #E4C55E;
    --teal: #2F6F63;
    --coral: #C1443C;
    --ink: #1F2937;
    --ink-soft: #6B7280;
    --hairline: #E7E1D3;
  }

  *{box-sizing:border-box;}

  body{
    font-family:'Sarabun', sans-serif;
    background:
      radial-gradient(circle at 15% 0%, rgba(201,162,39,0.18), transparent 45%),
      radial-gradient(circle at 100% 100%, rgba(47,111,99,0.25), transparent 50%),
      var(--navy-deep);
    min-height:100vh;
    padding:40px 16px;
    color:var(--ink);
    margin:0;
  }

  .wrap{
    max-width:560px;
    margin:0 auto;
  }

  .eyebrow{
    text-align:center;
    color:var(--gold-light);
    font-family:'Kanit', sans-serif;
    letter-spacing:.14em;
    font-size:12px;
    text-transform:uppercase;
    margin-bottom:8px;
    opacity:.85;
  }

  h1{
    font-family:'Kanit', sans-serif;
    font-weight:600;
    font-size:26px;
    color:var(--ivory);
    text-align:center;
    margin:0 0 28px;
    line-height:1.35;
  }

  .box{
    background:var(--ivory);
    padding:32px 28px 28px;
    border-radius:18px;
    box-shadow:0 24px 60px -20px rgba(0,0,0,.55), 0 2px 0 rgba(255,255,255,.6) inset;
    border:1px solid rgba(255,255,255,.5);
  }

  .field{ margin-top:18px; }
  .field:first-child{ margin-top:0; }

  label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13.5px;
    font-weight:600;
    color:var(--ink);
    margin-bottom:6px;
  }

  label .icon{
    width:18px; height:18px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    color:var(--teal);
    flex-shrink:0;
  }

  .input-wrap{ position:relative; }

  input{
    width:100%;
    padding:12px 44px 12px 14px;
    border:1.5px solid #DDD6C4;
    border-radius:10px;
    font-family:'Sarabun', sans-serif;
    font-size:15px;
    background:#fff;
    color:var(--ink);
    transition:border-color .15s ease, box-shadow .15s ease;
  }

  input::placeholder{ color:#B7B0A0; }

  input:focus{
    outline:none;
    border-color:var(--teal);
    box-shadow:0 0 0 3px rgba(47,111,99,.15);
  }

  .unit{
    position:absolute;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    font-size:12.5px;
    color:var(--ink-soft);
    pointer-events:none;
  }

  button{
    width:100%;
    margin-top:24px;
    padding:14px 16px;
    background:linear-gradient(135deg, var(--gold-light), var(--gold));
    color:var(--navy-deep);
    font-family:'Kanit', sans-serif;
    font-weight:600;
    font-size:15.5px;
    letter-spacing:.02em;
    border:none;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 8px 20px -6px rgba(201,162,39,.55);
    transition:transform .12s ease, box-shadow .12s ease;
  }

  button:hover{ transform:translateY(-1px); box-shadow:0 10px 24px -6px rgba(201,162,39,.65); }
  button:active{ transform:translateY(0); }

  #result{ margin-top:4px; }

  .error-msg{
    margin-top:22px;
    padding:14px 16px;
    background:#FBEAE8;
    border:1px solid #F0C6C1;
    border-radius:10px;
    color:var(--coral);
    font-size:14px;
    font-weight:600;
    display:flex;
    gap:10px;
    align-items:flex-start;
  }

  .result-card{
    margin-top:24px;
    padding-top:22px;
    border-top:1px dashed var(--hairline);
  }

  .result-card h4{
    font-family:'Kanit', sans-serif;
    font-size:14px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--teal);
    margin:0 0 14px;
  }

  .hero-number{
    background:linear-gradient(135deg, var(--navy), var(--navy-deep));
    border-radius:14px;
    padding:20px;
    text-align:center;
    margin-bottom:16px;
  }

  .hero-number .label{
    color:var(--gold-light);
    font-size:12.5px;
    letter-spacing:.05em;
    font-family:'Kanit', sans-serif;
  }

  .hero-number .value{
    color:var(--ivory);
    font-family:'Kanit', sans-serif;
    font-weight:700;
    font-size:32px;
    margin-top:4px;
  }

  .hero-number .value span{
    font-size:16px;
    font-weight:500;
    color:var(--gold-light);
    margin-left:4px;
  }

  .meter{
    margin-bottom:18px;
  }

  .meter-labels{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:6px;
  }

  .meter-track{
    height:10px;
    border-radius:6px;
    background:#EEE8D8;
    overflow:hidden;
    position:relative;
  }

  .meter-fill{
    height:100%;
    border-radius:6px;
    background:linear-gradient(90deg, var(--teal), var(--gold));
    transition:width .4s ease;
  }

  .stat-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:18px;
  }

  .stat{
    background:#F5F1E6;
    border-radius:10px;
    padding:12px 14px;
  }

  .stat .k{
    font-size:11.5px;
    color:var(--ink-soft);
    margin-bottom:3px;
  }

  .stat .v{
    font-family:'Kanit', sans-serif;
    font-weight:600;
    font-size:15px;
    color:var(--ink);
  }

  .table-title{
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    margin:4px 0 8px;
  }

  table{
    width:100%;
    border-collapse:collapse;
    font-size:12.5px;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 0 0 1px var(--hairline);
  }

  th,td{
    padding:8px 6px;
    text-align:right;
  }

  th{
    background:var(--navy);
    color:var(--ivory);
    font-weight:500;
    font-family:'Kanit', sans-serif;
    font-size:11.5px;
    letter-spacing:.02em;
  }

  td:first-child, th:first-child{ text-align:center; }

  tbody tr:nth-child(even){ background:#F7F4EA; }
  tbody tr:nth-child(odd){ background:#FFFFFF; }
  tbody tr:hover{ background:#EFE9D6; }

  td{ color:var(--ink); border-bottom:1px solid #F0EAD9; }

  @media (max-width:480px){
    .stat-grid{ grid-template-columns:1fr; }
    .box{ padding:24px 18px 22px; }
    h1{ font-size:22px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Lab 3.1 · การเงินส่วนบุคคล</div>
  <h1>ฟอร์มคำนวณสินเชื่อบ้าน</h1>

  <div class="box">
    <div class="field">
      <label><span class="icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 12l2-2 7-6 7 6 2 2M5 10v9a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1v-9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>เงินเดือน</label>
      <div class="input-wrap">
        <input type="number" id="salary" placeholder="เช่น 30000">
        <span class="unit">บาท</span>
      </div>
    </div>

    <div class="field">
      <label><span class="icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M3 10h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </span>จำนวนเงินกู้</label>
      <div class="input-wrap">
        <input type="number" id="loanAmount" placeholder="เช่น 3000000">
        <span class="unit">บาท</span>
      </div>
    </div>

    <div class="field">
      <label><span class="icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 17l4-6 4 3 4-8 4 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>อัตราดอกเบี้ย</label>
      <div class="input-wrap">
        <input type="number" id="interestRate" value="5">
        <span class="unit">% ต่อปี</span>
      </div>
    </div>

    <div class="field">
      <label><span class="icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>ระยะเวลา</label>
      <div class="input-wrap">
        <input type="number" id="years" value="30">
        <span class="unit">ปี</span>
      </div>
    </div>

    <button onclick="calculateLoan()">คำนวณ</button>
    <div id="result"></div>
  </div>
</div>

<script>
function calculateLoan() {
  let monthlySalary = parseFloat(document.getElementById("salary").value);
  let loanAmount = parseFloat(document.getElementById("loanAmount").value);
  let interestRate = parseFloat(document.getElementById("interestRate").value) / 100 / 12;
  let years = parseInt(document.getElementById("years").value);
  let months = years * 12;

  if ([monthlySalary, loanAmount, years].some(isNaN) || monthlySalary <= 0 || loanAmount <= 0 || years <= 0) {
    document.getElementById("result").innerHTML =
      `<div class="error-msg">⚠ <span>กรุณากรอกข้อมูลให้ครบและถูกต้อง</span></div>`;
    return;
  }

  // ตรวจสอบวงเงินกู้สูงสุด (200 เท่าของเงินเดือน)
  let maxLoan = monthlySalary * 200;
  if (loanAmount > maxLoan) {
    document.getElementById("result").innerHTML =
      `<div class="error-msg">⚠ <span>วงเงินกู้สูงสุดคือ ${maxLoan.toLocaleString(undefined,{minimumFractionDigits:2})} บาท (200 เท่าของเงินเดือน) กรุณากรอกใหม่</span></div>`;
    return;
  }

  // คำนวณค่างวดรายเดือน (PMT)
  let monthlyPayment = (loanAmount * interestRate * Math.pow(1 + interestRate, months)) /
                        (Math.pow(1 + interestRate, months) - 1);
  if (isNaN(monthlyPayment) || !isFinite(monthlyPayment)) {
    monthlyPayment = loanAmount / months;
  }

  // ตารางผ่อนชำระ 12 งวดแรก
  let remaining = loanAmount;
  let tableHtml = "<table><thead><tr><th>งวด</th><th>ค่างวด</th><th>ดอกเบี้ย</th><th>เงินต้น</th><th>คงเหลือ</th></tr></thead><tbody>";
  for (let i = 1; i <= Math.min(12, months); i++) {
    let interest = remaining * interestRate;
    let principal = monthlyPayment - interest;
    remaining -= principal;
    tableHtml += `<tr><td>${i}</td><td>${monthlyPayment.toFixed(2)}</td><td>${interest.toFixed(2)}</td><td>${principal.toFixed(2)}</td><td>${Math.max(0,remaining).toFixed(2)}</td></tr>`;
  }
  tableHtml += "</tbody></table>";

  let utilization = Math.min(100, (loanAmount / maxLoan) * 100);

  document.getElementById("result").innerHTML = `
    <div class="result-card">
      <h4>สรุปสินเชื่อบ้าน</h4>

      <div class="hero-number">
        <div class="label">ค่างวดต่อเดือน</div>
        <div class="value">${monthlyPayment.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2})}<span>บาท / เดือน</span></div>
      </div>

      <div class="meter">
        <div class="meter-labels">
          <span>วงเงินที่ขอ</span>
          <span>${utilization.toFixed(0)}% ของวงเงินสูงสุด</span>
        </div>
        <div class="meter-track">
          <div class="meter-fill" style="width:${utilization}%"></div>
        </div>
      </div>

      <div class="stat-grid">
        <div class="stat"><div class="k">วงเงินกู้</div><div class="v">${loanAmount.toLocaleString()} บาท</div></div>
        <div class="stat"><div class="k">อัตราดอกเบี้ย</div><div class="v">${(interestRate*1200).toFixed(2)}% ต่อปี</div></div>
        <div class="stat"><div class="k">ระยะเวลา</div><div class="v">${years} ปี (${months} เดือน)</div></div>
        <div class="stat"><div class="k">ดอกเบี้ยรวม</div><div class="v">${(monthlyPayment*months - loanAmount).toLocaleString(undefined,{maximumFractionDigits:0})} บาท</div></div>
        <div class="stat" style="grid-column:1 / -1"><div class="k">รวมชำระทั้งสิ้นตลอดสัญญา</div><div class="v">${(monthlyPayment*months).toLocaleString(undefined,{maximumFractionDigits:2})} บาท</div></div>
      </div>

      <div class="table-title">ตารางผ่อนชำระ (12 งวดแรก)</div>
      ${tableHtml}
    </div>
  `;
}
</script>
</body>
</html>
