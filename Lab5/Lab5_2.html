<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Lab 5.2 - คำนวณค่าส่ง (Dropdown)</title>
<style>
  *{margin:0; padding:0; box-sizing:border-box;}
  body{
    font-family:'Sarabun',sans-serif;
    background:linear-gradient(135deg, #ff006e 0%, #fb5607 50%, #ffbe0b 100%);
    padding:20px;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .box{
    max-width:500px; 
    width:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(15px);
    padding:40px; 
    border-radius:20px; 
    box-shadow:0 15px 50px rgba(0,0,0,0.4), 0 0 40px rgba(255,0,110,0.3);
    border:2px solid rgba(255,0,110,0.3);
    animation:float 3s ease-in-out infinite;
  }
  @keyframes float{
    0%, 100%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
  }
  h1{
    font-size:28px;
    background:linear-gradient(135deg, #ffbe0b, #ff006e, #fb5607);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:32px;
    font-weight:700;
    text-align:center;
  }
  label{
    display:block; 
    margin-top:18px; 
    font-size:15px;
    color:#fff;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:1px;
  }
  input, select{
    width:100%; 
    padding:14px 16px; 
    margin-top:8px; 
    border:2px solid rgba(255,0,110,0.4);
    border-radius:10px;
    background:rgba(255,255,255,0.1);
    color:#fff;
    font-family:'Sarabun',sans-serif;
    font-size:14px;
    transition:all 0.3s ease;
    backdrop-filter:blur(5px);
  }
  input::placeholder{
    color:rgba(255,255,255,0.5);
  }
  input:focus, select:focus{
    outline:none;
    border-color:#ffbe0b;
    box-shadow:0 0 20px rgba(255,190,11,0.4);
    transform:translateY(-2px);
    background:rgba(255,255,255,0.15);
  }
  button{
    margin-top:28px;
    width:100%;
    padding:16px 24px; 
    background:linear-gradient(135deg, #ffbe0b 0%, #ff006e 100%);
    color:#000; 
    border:none; 
    border-radius:10px; 
    cursor:pointer;
    font-size:16px;
    font-weight:700;
    font-family:'Sarabun',sans-serif;
    transition:all 0.3s ease;
    box-shadow:0 8px 25px rgba(255,0,110,0.3);
  }
  button:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 35px rgba(255,0,110,0.5);
  }
  button:active{
    transform:translateY(-1px);
  }
  #result{
    margin-top:28px; 
    background:rgba(255,190,11,0.1);
    border:2px solid rgba(255,190,11,0.4);
    padding:24px; 
    border-radius:12px; 
    font-size:15px;
    color:#fff;
    line-height:1.8;
    box-shadow:inset 0 0 20px rgba(255,190,11,0.08);
  }
  #result p{
    margin:12px 0;
  }
  #result strong{
    color:#ffbe0b;
    font-size:18px;
  }
</style>
</head>
<body>
<div class="box">
  <h1>Lab 5.2: ระบบคำนวณค่าส่ง</h1>
  <label>ราคาสินค้า (บาท)</label>
  <input type="number" id="price" placeholder="เช่น 450">
  <label>รูปแบบการจัดส่ง</label>
  <select id="shipping">
    <option value="50">EMS (50 บาท)</option>
    <option value="30">ลงทะเบียน (30 บาท)</option>
    <option value="15">ธรรมดา (15 บาท)</option>
  </select>
  <button onclick="calculateShipping()">คำนวณ</button>
  <div id="result"></div>
</div>

<script>
function calculateShipping() {
  const price = parseFloat(document.getElementById("price").value);
  if (isNaN(price) || price <= 0) {
    document.getElementById("result").innerHTML = "<b style='color:#b00020'>กรุณากรอกราคาสินค้าให้ถูกต้อง</b>";
    return;
  }

  let shippingCost = parseFloat(document.getElementById("shipping").value);

  // เงื่อนไขพิเศษ: ซื้อครบ 500 ค่าส่งฟรี
  if (price >= 500) {
    shippingCost = 0;
  }

  const total = price + shippingCost;

  document.getElementById("result").innerHTML = `
    <p>ราคาสินค้า: ${price.toFixed(2)} บาท</p>
    <p>ค่าจัดส่ง: ${shippingCost === 0 ? "ฟรี (ซื้อครบ 500 บาท)" : shippingCost.toFixed(2) + " บาท"}</p>
    <p><strong>ยอดรวมทั้งสิ้น: ${total.toFixed(2)} บาท</strong></p>
  `;
}
</script>
</body>
</html>
