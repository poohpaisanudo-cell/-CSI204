<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Lab 4.2b - แสดงข้อมูลสินค้า</title>
<style>
  body{font-family:'Sarabun',sans-serif; padding:20px; transition: background .3s, color .3s;}
  body.light{background:#ffebee; color:#222;}
  body.dark{background:#5c1a1a; color:#eee;}
  body.blue{background:#ffcdd2; color:#5c0a0a;}
  .box{max-width:420px; margin:auto; background:rgba(255,255,255,.85); color:#222; padding:24px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1);}
  h1{font-size:20px; color:#c41c3b;}
  p{margin:8px 0;}
  button{margin-top:10px; margin-right:8px; padding:8px 14px; border:none; border-radius:4px; cursor:pointer; background:#c41c3b; color:#fff;}
  button.danger{background:#8b0000;}
  a{display:inline-block; margin-top:14px; color:#c41c3b;}
</style>
</head>
<body class="light">
<div class="box">
  <h1>Lab 4.2b: ข้อมูลสินค้า</h1>
  <div id="productInfo">ยังไม่มีข้อมูลสินค้า</div>
  <button onclick="cycleTheme()">เปลี่ยน Theme</button>
  <button class="danger" onclick="clearProduct()">ล้างข้อมูล</button>
  <br><a href="lab4_2a.html">← กลับไปหน้าฟอร์ม</a>
</div>

<script>
function loadProduct() {
  const data = JSON.parse(localStorage.getItem("product"));
  if (!data) {
    document.getElementById("productInfo").innerText = "ยังไม่มีข้อมูลสินค้า กรุณากรอกฟอร์มก่อน";
    return;
  }
  document.getElementById("productInfo").innerHTML = `
    <p><b>ชื่อสินค้า:</b> ${data.productName}</p>
    <p><b>ราคา:</b> ${data.price} บาท</p>
    <p><b>จำนวน:</b> ${data.quantity} ชิ้น</p>
    <p><b>ประเภท:</b> ${data.category}</p>
    <p><b>หมายเหตุ:</b> ${data.notes || '-'}</p>
  `;
}

function cycleTheme() {
  const themes = ["light", "dark", "blue"];
  const current = themes.indexOf(document.body.className);
  const next = themes[(current + 1) % themes.length];
  document.body.className = next;
}

function clearProduct() {
  localStorage.removeItem("product");
  document.body.className = "light";
  loadProduct();
}

loadProduct();
</script>
</body>
</html>
