<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Lab 4.2a - เก็บข้อมูลสินค้า</title>
<style>
  body{font-family:'Sarabun',sans-serif; background:#ffebee; padding:20px;}
  .box{max-width:420px; margin:auto; background:#fff; padding:24px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1);}
  h1{font-size:20px; color:#c41c3b;}
  label{display:block; margin-top:12px; font-size:14px;}
  input, select, textarea{width:100%; padding:8px; margin-top:4px; border:1px solid #ccc; border-radius:4px; font-family:'Sarabun',sans-serif;}
  textarea{resize:vertical; min-height:80px;}
  button{margin-top:16px; padding:10px 16px; background:#c41c3b; color:#fff; border:none; border-radius:4px; cursor:pointer;}
  a{display:inline-block; margin-top:14px; color:#c41c3b;}
</style>
</head>
<body>
<div class="box">
  <h1>Lab 4.2a: ฟอร์มเก็บข้อมูลสินค้า</h1>
  <form onsubmit="return saveProduct(event)">
    <label>ชื่อสินค้า</label>
    <input type="text" id="productName" required>
    <label>ราคา</label>
    <input type="number" id="price" required>
    <label>จำนวน</label>
    <input type="number" id="quantity" required>
    <label>ประเภท</label>
    <select id="category">
      <option value="electronics">อิเล็กทรอนิกส์</option>
      <option value="clothing">เสื้อผ้า</option>
      <option value="food">อาหาร</option>
      <option value="other">อื่นๆ</option>
    </select>
    <label>หมายเหตุ</label>
    <textarea id="notes"></textarea>
    <button type="submit">บันทึกสินค้า</button>
  </form>
  <a href="lab4_2b.html">ไปหน้าแสดงสินค้า →</a>
</div>

<script>
function saveProduct(e) {
  e.preventDefault();
  const product = {
    productName: document.getElementById("productName").value,
    price: document.getElementById("price").value,
    quantity: document.getElementById("quantity").value,
    category: document.getElementById("category").value,
    notes: document.getElementById("notes").value
  };
  localStorage.setItem("product", JSON.stringify(product));
  alert("บันทึกสินค้าเรียบร้อย!");
  return false;
}
</script>
</body>
</html>
